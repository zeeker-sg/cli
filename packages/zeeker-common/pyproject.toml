[project]
name = "zeeker-common"
version = "0.1.0"
description = "Common utilities for Zeeker data projects"
readme = "README.md"
requires-python = ">=3.12"
license = {text = "MIT"}
authors = [{name = "Ang Hou Fu", email = "houfu@outlook.sg"}]
keywords = ["zeeker", "utilities", "data-processing"]

dependencies = [
    "httpx>=0.27.0",
    "tenacity>=8.2.0",
]

[project.optional-dependencies]
openai = ["openai>=1.0.0"]
all = ["openai>=1.0.0"]

[project.urls]
Homepage = "https://github.com/zeeker-sg/cli"
Repository = "https://github.com/zeeker-sg/cli"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
