name: Publish zeeker to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      package:
        description: 'Package to publish'
        required: true
        default: 'zeeker'
        type: choice
        options:
          - zeeker
          - zeeker-common

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: read
      # Required for PyPI Trusted Publishing (OIDC). Without it GitHub does
      # not expose ACTIONS_ID_TOKEN_REQUEST_URL to the job and `uv publish`
      # fails with "Trusted publishing failed ... Missing credentials".
      id-token: write
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install uv
      uses: astral-sh/setup-uv@v3

    - name: Build package
      # Release events carry no workflow_dispatch input — default to zeeker.
      run: uv build --package ${{ inputs.package || 'zeeker' }}

    - name: Publish to PyPI
      run: uv publish dist/*
