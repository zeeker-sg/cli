[project]
name = "zeeker-datasette"
version = "0.1.0"
description = "Datasette deployment package with custom templates, plugins, and S3 integration"
readme = "Readme.md"
requires-python = ">=3.12"
license = {text = "MIT"}
authors = [{name = "Ang Hou Fu", email = "houfu@outlook.sg"}]
keywords = ["datasette", "deployment", "s3", "sqlite"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3.12",
    "Topic :: Database",
]

dependencies = [
    "boto3>=1.28.0",
    "click>=8.1.3",
    "datasette-matomo>=0.1.2",
    "datasette-search-all>=1.1.4",
    "datasette-template-sql>=1.0",
    "datasette==0.65.1",
    "python-dotenv>=1.0.0",
    "pyyaml>=6.0.2",
]

[project.urls]
Homepage = "https://github.com/zeeker-sg/cli"
Repository = "https://github.com/zeeker-sg/cli"
Issues = "https://github.com/zeeker-sg/cli/issues"

[dependency-groups]
dev = [
    "pytest>=8.4.0",
    "pytest-mock>=3.14.1",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["zeeker_datasette"]

[tool.hatch.build.targets.wheel.shared-data]
"plugins" = "share/zeeker-datasette/plugins"
"templates" = "share/zeeker-datasette/templates"
"static" = "share/zeeker-datasette/static"
"scripts" = "share/zeeker-datasette/scripts"
"metadata.json" = "share/zeeker-datasette/metadata.json"
"Dockerfile" = "share/zeeker-datasette/Dockerfile"
"docker-compose.yml" = "share/zeeker-datasette/docker-compose.yml"
"entrypoint.sh" = "share/zeeker-datasette/entrypoint.sh"
"zeeker-refresh-cron.sh" = "share/zeeker-datasette/zeeker-refresh-cron.sh"
